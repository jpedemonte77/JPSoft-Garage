<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JPSoft | Garage</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#1a1a2e"/>
          <path d="M5 18V13a2 2 0 0 1 .4-1.2L9 7h10l3.6 4.8A2 2 0 0 1 23 13v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1z" fill="#4f8ef7" opacity=".85"/>
          <rect x="9" y="17" width="3" height="3" rx="1.5" fill="#fff"/>
          <rect x="16" y="17" width="3" height="3" rx="1.5" fill="#fff"/>
          <rect x="5" y="14" width="18" height="1.5" rx=".75" fill="#fff" opacity=".3"/>
        </svg>
        <span class="sidebar-title">JPSoft | Garage</span>
      </div>
      <button class="sidebar-close" id="sidebar-close" aria-label="Cerrar menú">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-view="mapa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Cocheras
      </a>
      <a href="#" class="nav-item" data-view="vehiculos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 17H3v-5l2.5-5h13L21 12v5h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>
        Vehículos
      </a>
      <a href="#" class="nav-item" data-view="alquileres">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Alquileres
      </a>
    </nav>
  </aside>

  <!-- OVERLAY SIDEBAR MOBILE -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" id="menu-btn" aria-label="Abrir menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="topbar-title" id="topbar-title">Cocheras</h1>
      <div class="topbar-actions">
        <div class="stats-mini">
          <span class="stat-pill libre" id="mini-libres">— libres</span>
          <span class="stat-pill ocupado" id="mini-ocupados">— ocupados</span>
        </div>
        <button class="btn-primary" id="btn-nuevo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Registrar
        </button>
      </div>
    </header>

    <!-- VIEW: MAPA -->
    <main class="view active" id="view-mapa">
      <div class="mapa-controles">
        <label class="control-label">Total de espacios:</label>
        <div class="espacio-selector">
          <button class="esp-btn" id="esp-minus">−</button>
          <span class="esp-num" id="esp-num">20</span>
          <button class="esp-btn" id="esp-plus">+</button>
        </div>
      </div>
      <div class="cocheras-grid" id="cocheras-grid"></div>
      <div class="leyenda">
        <span class="leyenda-item"><span class="dot libre"></span> Libre</span>
        <span class="leyenda-item"><span class="dot ocupado"></span> Ocupado</span>
      </div>
    </main>

    <!-- VIEW: VEHÍCULOS -->
    <main class="view" id="view-vehiculos">
      <div class="view-toolbar">
        <input type="search" class="search-input" id="search-vehiculos" placeholder="Buscar por nombre, patente o cochera…" />
        <select class="filter-select" id="filter-tipo">
          <option value="">Todos los tipos</option>
          <option value="auto">Auto</option>
          <option value="moto">Moto</option>
          <option value="camioneta">Camioneta / SUV</option>
          <option value="pickup">Pickup</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="vehiculos-grid" id="vehiculos-grid"></div>
    </main>

    <!-- VIEW: ALQUILERES -->
    <main class="view" id="view-alquileres">
      <div class="alquiler-header">
        <div class="alquiler-total-card">
          <p class="alq-label">Recaudación mensual total</p>
          <p class="alq-total" id="alq-total">$ 0</p>
        </div>
        <div class="alquiler-ajuste-card">
          <p class="alq-label">Ajuste global de alquileres</p>
          <div class="ajuste-form">
            <select id="ajuste-tipo" class="filter-select" style="width:auto">
              <option value="porcentaje">Por porcentaje (%)</option>
              <option value="monto">Nuevo monto fijo ($)</option>
            </select>
            <input type="number" id="ajuste-valor" class="ajuste-input" placeholder="Ej: 15" min="0" />
            <button class="btn-primary" id="btn-aplicar-ajuste">Aplicar a todos</button>
          </div>
        </div>
      </div>
      <div class="alquileres-list" id="alquileres-list"></div>
    </main>
  </div>

  <!-- MODAL REGISTRO -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-titulo" id="modal-titulo">Registrar vehículo</h2>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Apellido y Nombre<span class="req">*</span></label>
            <input type="text" class="form-input" id="f-nombre" placeholder="García, Juan" />
          </div>
          <div class="form-group">
            <label class="form-label">Cochera Nº <span class="req">*</span></label>
            <select class="form-input" id="f-cochera"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Patente <span class="req">*</span></label>
            <input type="text" class="form-input mono" id="f-patente" placeholder="ABC 123 / AB 123 CD" style="text-transform:uppercase" />
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de vehículo</label>
            <select class="form-input" id="f-tipo">
              <option value="auto">Auto</option>
              <option value="moto">Moto</option>
              <option value="camioneta">Camioneta / SUV</option>
              <option value="pickup">Pickup</option>
              <option value="otro">Otro</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">WhatsApp</label>
            <div class="input-prefix">
              <span class="prefix">+54</span>
              <input type="tel" class="form-input" id="f-wsp" placeholder="341 555 1234" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Monto de alquiler ($)</label>
            <input type="number" class="form-input" id="f-monto" placeholder="Ej: 50000" min="0" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Tarjeta verde (foto)</label>
          <div class="file-drop" id="file-drop">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Arrastrá una foto o <label class="file-link" for="f-tarjeta">hacé click aquí</label></span>
            <input type="file" id="f-tarjeta" accept="image/*" style="display:none" />
            <div class="file-preview-wrap hidden" id="file-preview-wrap">
              <img id="file-preview" class="file-preview" alt="Tarjeta verde" />
              <button type="button" class="file-remove" id="file-remove">✕</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas</label>
          <textarea class="form-input form-textarea" id="f-notas" placeholder="Observaciones, aclaraciones…" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger hidden" id="btn-eliminar">Eliminar</button>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="btn-cancelar">Cancelar</button>
          <button class="btn-primary" id="btn-guardar">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE COCHERA -->
  <div class="modal-overlay hidden" id="detalle-overlay">
    <div class="modal modal-sm" id="detalle-modal">
      <div class="modal-header">
        <h2 class="modal-titulo" id="detalle-titulo">Cochera Nº —</h2>
        <button class="modal-close" id="detalle-close">✕</button>
      </div>
      <div class="modal-body" id="detalle-body"></div>
      <div class="modal-footer">
        <div class="modal-footer-right">
          <button class="btn-secondary" id="detalle-editar">Editar</button>
          <button class="btn-wsp hidden" id="detalle-wsp">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.99 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.985-1.31A9.954 9.954 0 0 0 11.99 22C17.522 22 22 17.523 22 12S17.522 2 11.99 2zm.01 18.181a8.17 8.17 0 0 1-4.165-1.138l-.299-.177-3.093.812.825-3.02-.194-.31A8.185 8.185 0 0 1 3.818 12C3.818 7.479 7.48 3.818 12 3.818c4.522 0 8.182 3.661 8.182 8.182 0 4.522-3.66 8.181-8.182 8.181z"/></svg>
            Enviar WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast hidden" id="toast"></div>

  <!-- FIREBASE -->
  <script type="module" src="app.js"></script>
</body>
</html>
